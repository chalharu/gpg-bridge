name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'server/**'
      - 'daemon/**'
      - 'mobile/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'server/**'
      - 'daemon/**'
      - 'mobile/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'server/**'
              - 'daemon/**'
              - '.github/workflows/ci.yml'
            flutter:
              - 'mobile/**'
              - '.github/workflows/ci.yml'

  rust-check:
    name: Rust cargo check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Cargo check
        run: cargo check --workspace --locked

  flutter-analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: mobile
        run: flutter analyze
