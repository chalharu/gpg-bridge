name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust-check:
    name: Rust cargo check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check

  flutter-analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: mobile
        run: flutter analyze
