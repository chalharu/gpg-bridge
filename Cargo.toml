[workspace]
resolver = "3"
members = ["server", "daemon"]

[workspace.package]
authors = ["chalharu"]
repository = "https://github.com/chalharu/gpg-bridge.git"
license = "AGPL-3.0"
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = "1.0.102"
axum = "0.8.8"
clap = { version = "4.5.60", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
