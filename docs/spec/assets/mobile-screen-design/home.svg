<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 860" role="img" aria-labelledby="title desc">
  <title id="title">Home screen mockup</title>
  <desc id="desc">Main shell home tab with refresh checks and reset registration action.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <style>
      text { font-family: Arial, sans-serif; fill: #0f172a; }
      .eyebrow { font-size: 14px; letter-spacing: 1.4px; fill: #475569; }
      .heading { font-size: 28px; font-weight: 700; }
      .screen-title { font-size: 20px; font-weight: 700; }
      .body { font-size: 13px; fill: #334155; }
      .small { font-size: 12px; fill: #475569; }
      .button { font-size: 15px; font-weight: 700; fill: #ffffff; }
      .nav { font-size: 11px; fill: #475569; }
      .nav-active { font-size: 11px; font-weight: 700; fill: #1d4ed8; }
    </style>
  </defs>
  <rect width="420" height="860" fill="url(#bg)"/>
  <text x="34" y="54" class="eyebrow">MAIN SHELL</text>
  <text x="34" y="88" class="heading">Home</text>
  <text x="34" y="114" class="body">Route: /</text>
  <rect x="62" y="146" width="296" height="622" rx="38" fill="#0f172a"/>
  <rect x="76" y="160" width="268" height="594" rx="30" fill="#ffffff"/>
  <rect x="178" y="170" width="64" height="8" rx="4" fill="#94a3b8"/>
  <text x="96" y="212" class="screen-title">ホーム</text>
  <rect x="94" y="238" width="232" height="132" rx="24" fill="url(#card)"/>
  <text x="116" y="274" class="small" fill="#dbeafe">On first frame</text>
  <text x="116" y="308" class="heading" fill="#ffffff">JWT / FCM</text>
  <text x="116" y="336" class="heading" fill="#ffffff">refresh check</text>
  <text x="116" y="360" class="body" fill="#dbeafe">
    <tspan x="116" dy="0">Listener startup happens from</tspan>
    <tspan x="116" dy="18">this tab after registration.</tspan>
  </text>
  <rect x="94" y="396" width="232" height="82" rx="18" fill="#f8fafc" stroke="#bfdbfe" stroke-width="2"/>
  <text x="108" y="428" class="small">checkAndRefreshDeviceJwt()</text>
  <text x="108" y="452" class="small">checkAndRefreshFcmToken()</text>
  <rect x="112" y="546" width="196" height="54" rx="27" fill="#dc2626"/>
  <text x="210" y="579" class="button" text-anchor="middle">Reset registration</text>
  <text x="210" y="624" class="small" text-anchor="middle">Failure path shows SnackBar</text>
  <rect x="88" y="646" width="244" height="44" rx="20" fill="#eef2ff"/>
  <circle cx="122" cy="702" r="9" fill="#1d4ed8"/>
  <text x="210" y="665" class="tiny" text-anchor="middle">
    <tspan x="210" dy="0">Home tab keeps the selected state</tspan>
    <tspan x="210" dy="14">inside NavigationBar.</tspan>
  </text>
  <rect x="76" y="696" width="268" height="58" rx="0" fill="#f8fafc"/>
  <line x1="76" y1="696" x2="344" y2="696" stroke="#cbd5e1"/>
  <text x="109" y="730" class="nav-active">Home</text>
  <text x="171" y="730" class="nav">Keys</text>
  <text x="232" y="730" class="nav">Pairing</text>
  <text x="303" y="730" class="nav">Settings</text>
</svg>