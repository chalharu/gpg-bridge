<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 860" role="img" aria-labelledby="title desc">
  <title id="title">Keys screen mockup</title>
  <desc id="desc">Keys route with E2E public key tab and GPG key tab states represented in one composition.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      text { font-family: Arial, sans-serif; fill: #0f172a; }
      .eyebrow { font-size: 14px; letter-spacing: 1.4px; fill: #475569; }
      .heading { font-size: 28px; font-weight: 700; }
      .screen-title { font-size: 20px; font-weight: 700; }
      .body { font-size: 13px; fill: #334155; }
      .small { font-size: 12px; fill: #475569; }
      .tiny { font-size: 11px; fill: #64748b; }
      .nav { font-size: 11px; fill: #475569; }
      .nav-active { font-size: 11px; font-weight: 700; fill: #1d4ed8; }
    </style>
  </defs>
  <rect width="420" height="860" fill="url(#bg)"/>
  <text x="34" y="54" class="eyebrow">MAIN SHELL</text>
  <text x="34" y="88" class="heading">Keys</text>
  <text x="34" y="114" class="body">Route: /keys</text>
  <rect x="62" y="146" width="296" height="622" rx="38" fill="#0f172a"/>
  <rect x="76" y="160" width="268" height="594" rx="30" fill="#ffffff"/>
  <rect x="178" y="170" width="64" height="8" rx="4" fill="#94a3b8"/>
  <text x="96" y="212" class="screen-title">鍵管理</text>
  <rect x="90" y="232" width="240" height="42" rx="16" fill="#e2e8f0"/>
  <rect x="94" y="236" width="116" height="34" rx="13" fill="#dbeafe"/>
  <text x="152" y="257" class="tiny" text-anchor="middle">E2E公開鍵</text>
  <text x="268" y="257" class="tiny" text-anchor="middle">GPG鍵</text>
  <rect x="94" y="292" width="232" height="110" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <circle cx="118" cy="326" r="14" fill="#2563eb"/>
  <text x="118" y="331" class="small" fill="#ffffff" text-anchor="middle">★</text>
  <text x="144" y="322" class="body">認証用 ES256</text>
  <text x="144" y="344" class="tiny">kid: abcd1234…</text>
  <text x="144" y="366" class="tiny">
    <tspan x="144" dy="0">defaultKid に一致する鍵は</tspan>
    <tspan x="144" dy="14">star 表示</tspan>
  </text>
  <rect x="94" y="416" width="232" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="112" y="442" class="body">
    <tspan x="112" dy="0">pull-to-refresh /</tspan>
    <tspan x="112" dy="18">削除確認 / 再試行</tspan>
  </text>
  <text x="112" y="480" class="tiny">空状態: 登録されている公開鍵はありません</text>
  <rect x="92" y="508" width="236" height="146" rx="22" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="112" y="548" class="body">GPG鍵タブの状態</text>
  <rect x="112" y="566" width="196" height="34" rx="12" fill="#ffffff"/>
  <text x="126" y="588" class="tiny">Key ID: 8C8A4A1F91EE</text>
  <rect x="112" y="610" width="196" height="34" rx="12" fill="#ffffff"/>
  <text x="126" y="632" class="tiny">Keygrip: 4A1B77C0D1E2F3A4…</text>
  <circle cx="300" cy="628" r="20" fill="#2563eb"/>
  <path d="M292 628h16M300 620v16" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <text x="210" y="672" class="tiny" text-anchor="middle">
    <tspan x="210" dy="0">FAB opens GPG鍵インポート</tspan>
    <tspan x="210" dy="14">via Navigator.push</tspan>
  </text>
  <rect x="76" y="696" width="268" height="58" fill="#f8fafc"/>
  <line x1="76" y1="696" x2="344" y2="696" stroke="#cbd5e1"/>
  <text x="109" y="730" class="nav">Home</text>
  <text x="171" y="730" class="nav-active">Keys</text>
  <text x="232" y="730" class="nav">Pairing</text>
  <text x="303" y="730" class="nav">Settings</text>
</svg>