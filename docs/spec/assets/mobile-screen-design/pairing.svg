<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 860" role="img" aria-labelledby="title desc">
  <title id="title">Pairing screen mockup</title>
  <desc id="desc">Pairing list with unpair actions and QR scan entry button.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <style>
      text { font-family: Arial, sans-serif; fill: #0f172a; }
      .eyebrow { font-size: 14px; letter-spacing: 1.4px; fill: #475569; }
      .heading { font-size: 28px; font-weight: 700; }
      .screen-title { font-size: 20px; font-weight: 700; }
      .body { font-size: 13px; fill: #334155; }
      .small { font-size: 12px; fill: #475569; }
      .tiny { font-size: 11px; fill: #64748b; }
      .nav { font-size: 11px; fill: #475569; }
      .nav-active { font-size: 11px; font-weight: 700; fill: #1d4ed8; }
    </style>
  </defs>
  <rect width="420" height="860" fill="url(#bg)"/>
  <text x="34" y="54" class="eyebrow">MAIN SHELL</text>
  <text x="34" y="88" class="heading">Pairing</text>
  <text x="34" y="114" class="body">Route: /pairing</text>
  <rect x="62" y="146" width="296" height="622" rx="38" fill="#0f172a"/>
  <rect x="76" y="160" width="268" height="594" rx="30" fill="#ffffff"/>
  <rect x="178" y="170" width="64" height="8" rx="4" fill="#94a3b8"/>
  <text x="96" y="212" class="screen-title">ペアリング</text>
  <rect x="94" y="240" width="232" height="96" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="114" y="270" class="body">client-a</text>
  <text x="114" y="293" class="tiny">ID: pair-001</text>
  <text x="114" y="316" class="tiny">ペアリング日時: 2026/03/09 10:30</text>
  <circle cx="300" cy="288" r="16" fill="#fee2e2"/>
  <path d="M294 282l12 12M306 282l-12 12" stroke="#b91c1c" stroke-width="3" stroke-linecap="round"/>
  <rect x="94" y="350" width="232" height="96" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="114" y="380" class="body">laptop-signing</text>
  <text x="114" y="403" class="tiny">ID: pair-002</text>
  <text x="114" y="426" class="tiny">解除前に確認ダイアログを表示</text>
  <rect x="94" y="468" width="232" height="78" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="114" y="495" class="body">
    <tspan x="114" dy="0">読み込み失敗時は</tspan>
    <tspan x="114" dy="18">再試行ボタン</tspan>
  </text>
  <text x="114" y="530" class="tiny">空状態: ペアリングされたデバイスはありません</text>
  <circle cx="302" cy="624" r="28" fill="#2563eb"/>
  <rect x="290" y="612" width="24" height="24" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
  <path d="M298 620h8M302 616v8" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <text x="210" y="672" class="small" text-anchor="middle">
    <tspan x="210" dy="0">FAB pushes</tspan>
    <tspan x="210" dy="16">QR scan screen</tspan>
  </text>
  <rect x="76" y="696" width="268" height="58" fill="#f8fafc"/>
  <line x1="76" y1="696" x2="344" y2="696" stroke="#cbd5e1"/>
  <text x="109" y="730" class="nav">Home</text>
  <text x="171" y="730" class="nav">Keys</text>
  <text x="232" y="730" class="nav-active">Pairing</text>
  <text x="303" y="730" class="nav">Settings</text>
</svg>