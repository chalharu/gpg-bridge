<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 860" role="img" aria-labelledby="title desc">
  <title id="title">Sign request screen mockup</title>
  <desc id="desc">Transient sign request screen with countdown, details, and approve or deny actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <style>
      text { font-family: Arial, sans-serif; fill: #0f172a; }
      .eyebrow { font-size: 14px; letter-spacing: 1.4px; fill: #7c2d12; }
      .heading { font-size: 28px; font-weight: 700; }
      .screen-title { font-size: 20px; font-weight: 700; }
      .body { font-size: 13px; fill: #334155; }
      .small { font-size: 12px; fill: #7c2d12; }
      .tiny { font-size: 11px; fill: #475569; }
      .button { font-size: 14px; font-weight: 700; fill: #ffffff; }
      .button-dark { font-size: 14px; font-weight: 700; fill: #0f172a; }
    </style>
  </defs>
  <rect width="420" height="860" fill="url(#bg)"/>
  <text x="34" y="54" class="eyebrow">FCM TRIGGERED OVERLAY</text>
  <text x="34" y="88" class="heading">Sign Request</text>
  <text x="34" y="114" class="body">Route: /sign-request/:requestId</text>
  <rect x="62" y="146" width="296" height="622" rx="38" fill="#0f172a"/>
  <rect x="76" y="160" width="268" height="594" rx="30" fill="#ffffff"/>
  <rect x="178" y="170" width="64" height="8" rx="4" fill="#94a3b8"/>
  <text x="96" y="212" class="screen-title">署名要求</text>
  <rect x="94" y="240" width="232" height="64" rx="18" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
  <text x="210" y="268" class="small" text-anchor="middle">CountdownBanner</text>
  <text x="210" y="288" class="body" text-anchor="middle">残り時間 00:52</text>
  <rect x="94" y="326" width="232" height="202" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="114" y="360" class="body">algorithm</text>
  <text x="114" y="382" class="tiny">
    <tspan x="114" dy="0">openpgp detached</tspan>
    <tspan x="114" dy="14">signature</tspan>
  </text>
  <text x="114" y="430" class="body">key ID</text>
  <text x="114" y="452" class="tiny">8C8A4A1F91EE</text>
  <text x="114" y="488" class="body">hash</text>
  <text x="114" y="510" class="tiny">2fd4e1c67a2d28fced849ee1bb76e739...</text>
  <rect x="94" y="548" width="232" height="46" rx="23" fill="#15803d"/>
  <text x="210" y="576" class="button" text-anchor="middle">承認</text>
  <rect x="94" y="606" width="232" height="46" rx="23" fill="#b91c1c"/>
  <text x="210" y="634" class="button" text-anchor="middle">拒否</text>
  <rect x="94" y="664" width="232" height="46" rx="23" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="210" y="692" class="button-dark" text-anchor="middle">無視</text>
  <text x="210" y="726" class="tiny" text-anchor="middle">
    <tspan x="210" dy="0">timeout shows SnackBar</tspan>
    <tspan x="210" dy="14">and auto closes the page</tspan>
  </text>
</svg>