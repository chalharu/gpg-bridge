# SonarCloud configuration
sonar.projectKey=chalharu_gpg-bridge
sonar.organization=chalharu

# Sources
# Android app code is Kotlin-only today; Java directories are excluded until real Java sources/tests are added.
sonar.sources=server/src,daemon/src,mobile/lib,mobile/android/app/src/main/kotlin

# Tests
sonar.tests=mobile/test,mobile/android/app/src/test/kotlin

# Coverage reports
sonar.rust.lcov.reportPaths=lcov-rust.info
sonar.dart.lcov.reportPaths=mobile/coverage/lcov.info
sonar.coverage.jacoco.xmlReportPaths=mobile/build/app/reports/jacoco/test/jacocoTestReport.xml

# Exclusions
sonar.exclusions=**/build/**,**/target/**,**/*.g.dart,**/*.freezed.dart

# Encoding
sonar.sourceEncoding=UTF-8
